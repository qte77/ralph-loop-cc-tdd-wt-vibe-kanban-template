---
# https://github.blog/changelog/2025-10-28-upcoming-deprecation-of-codeql-action-v3/
name: "CodeQL"

on:
  push:
  pull_request:
  schedule:
    - cron: '27 11 * * 0'
  workflow_dispatch:

# Reason: pull_request trigger lets CodeQL report on the PR merge-ref that branch
# protection waits for (push-only left some PRs BLOCKED). cancel-in-progress
# tames the merge-ref-SHA churn the push-only variant was avoiding.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
      with:
        languages: ${{ vars.CODEQL_LANGUAGES || 'python' }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4

    - name: Perform CodeQL Analysis
      id: analyze
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
      with:
        output: sarif-results

    - name: Dismiss alerts with inline suppression comments
      uses: advanced-security/dismiss-alerts@046d6b48d2e43cf563f96f67332c47c432eff83e  # v2.0.2
      with:
        sarif-id: ${{ steps.analyze.outputs.sarif-id }}
        sarif-file: sarif-results
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
